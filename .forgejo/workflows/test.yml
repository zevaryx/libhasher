on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - '**'

jobs:
  test:
    runs-on: docker
    container:
      image: zevaryx/rustcross:latest
      options: "--security-opt seccomp=unconfined"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: cargo tarpaulin -o xml
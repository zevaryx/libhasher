on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux and Windows Cross Compilers
        run: apt-get update && apt-get install --yes --no-install-recommends musl-tools gcc-mingw-w64-x86-64-win32 curl

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs -o rustup-init.sh
          chmod +x rustup-init.sh
          ./rustup-init.sh -y
          . "$HOME/.cargo/env"
          rustup target add x86_64-unknown-linux-musl x86_64-pc-windows-gnu

      - name: Build the release
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --target x86_64-unknown-linux-musl --target x86_64-pc-windows-gnu
          ls target/
          mkdir -p release
          cp ./target/x86_64-unknown-linux-musl/release/hasher release/hasher-gnu-linux-x86_64
          cp ./target/x86_64-pc-windows-gnu/release/hasher.exe release/hasher-windows.exe

      - name: Generate SHA256 checksums
        run: |
          cd release
          hasher-gnu-linux-x86_64
          ./hasher-gnu-linux-x86_64 -a sha256 hasher-gnu-linux-x86_64 -o hasher-gnu-linux-x86_64.sha256
          ./hasher-gnu-linux-x86_64 -a sha256 hasher-windows.exe -o hasher-windows.exe.sha256

      - name: Upload release binaries
        uses: actions/forgejo-release@v2.5.0
        with:
          url: "https://git.zevaryx.com"
          repo: "zevaryx/hasher-rs"
          direction: upload
          tag: "${{ github.ref_name }}"
          sha: "${{ github.sha }}"
          release-dir: release
          token: ${{ github.TOKEN }}
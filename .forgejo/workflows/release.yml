on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux and Windows Cross Compilers
        run: apt-get update && apt-get install --yes --no-install-recommends clang llvm musl-tools gcc-mingw-w64-x86-64-win32 curl

      - name: Setup rust
        uses: theoparis/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,x86_64-pc-windows-gnu

      - name: Build the release
        run: |
          export CC_aarch64_unknown_linux_musl=clang
          export AR_aarch64_unknown_linux_musl=llvm-ar
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-Clink-self-contained=yes -Clinker=rust-lld"
          cargo build --release --target x86_64-unknown-linux-musl --target aarch64-unknown-linux-musl --target x86_64-pc-windows-gnu
      
      - name: Generate the release folder
        run: |
          mkdir -p release
          cp ./target/x86_64-unknown-linux-musl/release/hasher release/hasher-gnu-linux-x86_64
          cp ./target/aarch64-unknown-linux-musl/release/hasher release/hasher-gnu-linux-aarch64
          cp ./target/x86_64-pc-windows-gnu/release/hasher.exe release/hasher-windows.exe
          cd release
          chmod +x hasher-gnu-linux-x86_64
          for file in *; do hasher -a sha256 $file -o ${file}.sha256; done

      - name: Upload release binaries
        uses: actions/forgejo-release@v2.5.0
        with:
          url: "https://git.zevaryx.com"
          repo: "zevaryx/hasher-rs"
          direction: upload
          tag: "${{ github.ref_name }}"
          sha: "${{ github.sha }}"
          release-dir: release
          token: ${{ github.TOKEN }}
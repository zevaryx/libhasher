[package]
name = "hasher"
version = "0.1.1"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.95"
blake2 = "0.10.6"
clap = { version = "4.5.23", features = ["derive"] }
colored = "2.2.0"
digest = { version = "0.10.7", features = ["alloc"] }
md-5 = "0.10.6"
sha1 = "0.10.6"
sha2 = "0.10.8"
sha3 = "0.10.8"
noncrypto-digests = "0.3.6"